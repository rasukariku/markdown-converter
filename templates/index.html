<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            startup: { typeset: false },
            options: { renderActions: { addRawTex: [150, (doc) => { for (const math of doc.math) { if (math.typesetRoot) { math.typesetRoot.setAttribute('data-raw-tex', math.math); math.typesetRoot.setAttribute('data-math-display', math.display ? 'true' : 'false'); } } }, (math, doc) => { if (math.typesetRoot) { math.typesetRoot.setAttribute('data-raw-tex', math.math); math.typesetRoot.setAttribute('data-math-display', math.display ? 'true' : 'false'); } }] } }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    <script src="https://unpkg.com/turndown-plugin-gfm/dist/turndown-plugin-gfm.js"></script>
</head>
<body>

    <div class="top-toggles">
        <button id="lang-toggle" class="toggle-btn" title="Switch Language">EN</button>
        <button id="theme-toggle" class="toggle-btn" title="Toggle Theme">🌓</button>
    </div>

    <div class="header-container">
        <div class="title-wrapper">
            <span class="rgb-animate" id="typewriter-title"></span><span class="cursor"></span>
        </div>
        <p class="subtitle" id="main-subtitle">
            <span id="sub-1">Convert Text from</span> 
            <span class="rgb-animate" style="font-weight: bold; margin: 0 2px;">AI</span> 
            <span id="sub-2">to</span>
            <span class="format-cycle rgb-animate" id="cycle-text" style="margin-left: 2px;">WORD</span>
        </p>
    </div>

    <div class="editor-container">
        <div class="toolbar" id="main-toolbar">
            <button id="btn-open-raw" class="btn-red" title="Insert Markdown"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></button>
            <button id="btn-open-uni" class="btn-blue" title="Export to Notes App"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></button>

            <div class="divider"></div>
            <button id="btn-undo" class="tool-btn" onclick="formatDoc('undo')" title="Undo"><svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C20.76 10.54 17.03 8 12.5 8z"/></svg></button>
            <button id="btn-redo" class="tool-btn" onclick="formatDoc('redo')" title="Redo"><svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 2.71-9.96 6.65l2.36.78c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg></button>
            <button id="btn-fullscreen" class="tool-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>

            <div class="divider"></div>
            <button id="btn-bold" class="tool-btn bold" onclick="formatDoc('bold')" title="Bold">B</button>
            <button id="btn-italic" class="tool-btn italic" onclick="formatDoc('italic')" title="Italic">I</button>
            <button id="btn-underline" class="tool-btn" onclick="formatDoc('underline')" title="Underline"><span style="text-decoration: underline; font-family: serif; font-size: 18px; font-weight: bold;">U</span></button>
            <button id="btn-strike" class="tool-btn" onclick="formatDoc('strikeThrough')" title="Strikethrough"><span style="text-decoration: line-through; font-family: serif; font-size: 18px; font-weight: bold;">S</span></button>

            <div class="divider"></div>
            <button id="btn-expand" class="tool-btn" title="Show/Hide Advanced Buttons" onclick="toggleToolbar()"><svg id="icon-expand" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5H7z"/></svg></button>

            <div class="divider tool-hidden"></div>
            <select class="tool-select tool-hidden" id="block-format-select" onchange="formatDoc('formatBlock', this.value)" title="Paragraph Format">
                <option value="P">Paragraph</option><option value="H1">Heading 1</option><option value="H2">Heading 2</option><option value="H3">Heading 3</option><option value="PRE">Preformatted</option>
            </select>
            <button id="btn-ul" class="tool-btn tool-hidden" onclick="formatDoc('insertUnorderedList')" title="Bullet List"><svg viewBox="0 0 24 24"><path d="M4 6h2v2H4zm0 5h2v2H4zm0 5h2v2H4zm4-10h12v2H8zm0 5h12v2H8zm0 5h12v2H8z"/></svg></button>
            <button id="btn-ol" class="tool-btn tool-hidden" onclick="formatDoc('insertOrderedList')" title="Numbered List"><svg viewBox="0 0 24 24"><path d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9V10H2v1zm5-6v2h14V5H7zm0 14h14v-2H7v2zm0-6h14v-2H7v2z"/></svg></button>
            <button id="btn-hr" class="tool-btn tool-hidden" onclick="insertHorizontalRule()" title="Horizontal Line"><svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg></button>

            <button id="btn-outdent" class="tool-btn tool-hidden" onclick="formatDoc('outdent')" title="Decrease Indent"><svg viewBox="0 0 24 24"><path d="M11 17h10v-2H11v2zm-8-5l4 4V8l-4 4zm0 9h18v-2H3v2zM3 8v2h18V3H3zm8 6h10V7H11v2zm0 4h10v-2H11v2z"/></svg></button>
            <button id="btn-indent" class="tool-btn tool-hidden" onclick="formatDoc('indent')" title="Increase Indent"><svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zM3 8v8l4-4-4-4zm8 9h10v-2H11v2zM3 3v2h18V3H3zm8 6h10V7H11v2zm0 4h10v-2H11v2z"/></svg></button>

            <button id="btn-ltr" class="tool-btn tool-hidden" onclick="setDirection('ltr')" title="Direction Left to Right"><b style="font-family:serif;font-size:14px;">LTR</b></button>
            <button id="btn-rtl" class="tool-btn tool-hidden" onclick="setDirection('rtl')" title="Direction Right to Left"><b style="font-family:serif;font-size:14px;">RTL</b></button>

            <div class="divider tool-hidden"></div>
            <button id="btn-link" class="tool-btn tool-hidden" onclick="openWin('win-link')" title="Insert/Edit Link"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg></button>
            <button id="btn-unlink" class="tool-btn tool-hidden" onclick="formatDoc('unlink')" title="Unlink"><svg viewBox="0 0 24 24"><path d="M17 7h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1 0 1.43-.98 2.63-2.31 2.98l1.46 1.46C20.88 15.61 22 13.95 22 12c0-2.76-2.24-5-5-5zm-1 4h-2.19l2 2H16zM2 4.27l3.11 3.11C3.29 8.12 2 9.91 2 12c0 2.76 2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1 0-1.59.88-2.93 2.19-3.62l2.67 2.67c-.52.27-.86.8-.86 1.45h2l2 2 3.84 3.84 1.27-1.27L3.27 3 2 4.27z"/></svg></button>
            <button id="btn-image" class="tool-btn tool-hidden" onclick="openWin('win-image')" title="Insert Image Link"><svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg></button>
            <button id="btn-emoticon" class="tool-btn tool-hidden" onclick="openWin('win-emoticon')" title="Insert Emoticon">😀</button>
            <button id="btn-find" class="tool-btn tool-hidden" onclick="openWin('win-find')" title="Find / Replace"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>

            <div class="divider tool-hidden"></div>
            <button id="btn-align-left" class="tool-btn tool-hidden" onclick="formatDoc('justifyLeft')" title="Align Left"><svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm0-4h12v-2H3v2zm0-4h18v-2H3v2zm0-4h12V7H3v2zm0-6v2h18V3H3z"/></svg></button>
            <button id="btn-align-center" class="tool-btn tool-hidden" onclick="formatDoc('justifyCenter')" title="Align Center"><svg viewBox="0 0 24 24"><path d="M7 15v2h10v-2H7zm-4 6h18v-2H3v2zm0-8h18v-2H3v2zm4-6v2h10V7H7zM3 3v2h18V3H3z"/></svg></button>
            <button id="btn-align-right" class="tool-btn tool-hidden" onclick="formatDoc('justifyRight')" title="Align Right"><svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm6-4h12v-2H9v2zm-6-4h18v-2H3v2zm6-4h12V7H9v2zM3 3v2h18V3H3z"/></svg></button>
            <button id="btn-align-justify" class="tool-btn tool-hidden" onclick="formatDoc('justifyFull')" title="Justify"><svg viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18V7H3v2zm0-6v2h18V3H3z"/></svg></button>

            <div class="divider tool-hidden"></div>
            <button class="tool-btn tool-hidden" onclick="openWin('win-table')" title="Insert Table"><svg viewBox="0 0 24 24"><path d="M20 3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 2v3H4V5h16zm-9 14H4v-5h7v5zm0-7H4v-5h7v5zm9 7h-7v-5h7v5zm0-7h-7v-5h7v5z"/></svg></button>
            <div class="divider tool-hidden"></div>
            <button id="btn-sup" class="tool-btn tool-hidden" onclick="formatDoc('superscript')" title="Superscript" style="font-family: monospace;">x²</button>
            <button id="btn-sub" class="tool-btn tool-hidden" onclick="formatDoc('subscript')" title="Subscript" style="font-family: monospace;">x₂</button>

            <button id="btn-clear" class="tool-btn tool-hidden" onclick="formatDoc('removeFormat')" title="Clear Formatting"><svg viewBox="0 0 24 24"><path d="M3.27 5L2 6.27l3.97 3.97L4 15h2v-2h2.2l4.13 4.13c-.85.3-1.63.79-2.33 1.37L12 20.6l2.18-2.18 4.55 4.55 1.27-1.27L3.27 5zM9.51 11.78l1.71 1.71-1.39 1.39-2.22-2.22 1.9-1.9v1.02zM15 8v-.88c0-.62-.5-1.12-1.12-1.12h-2.18l-2-2H20v2h-8.58l4.02 4.02L15 10.42V8z"/></svg></button>
        </div>

        <div id="rendered-output" contenteditable="true" dir="ltr" data-placeholder="Type or paste AI content here ..."></div>

        <div class="editor-footer" id="word-counter-pill">
            <span id="selection-info" style="color: #4f46e5; font-weight: bold; display: none;">(Text Selected)</span>
            <span id="auto-save-status" style="color: #10b981; font-weight: bold; font-size: 11px; display: none; align-items: center; gap: 4px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg> Saved</span>
            <span id="char-count">0 Characters</span>
            <span id="word-count">0 Words</span>
            <span id="sentence-count">0 Sentences</span>
            <span id="paragraph-count">0 Paragraphs</span>
            <span id="read-time" style="color:var(--text-muted); border-top:1px solid var(--border-color); padding-top:4px; margin-top:2px;">0 Min Read</span>
        </div>
    </div>

    <div class="footer-branding">
        <a href="https://github.com/rasukariku" target="_blank" title="Visit GitHub Profile" class="cat-wrapper">
            <svg width="110" height="88" viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">
                <rect x="10" y="60" width="40" height="15" fill="#4b5563" />
                <rect x="10" y="60" width="40" height="5" fill="#6b7280" />
                <rect x="25" y="40" width="20" height="20" fill="#ea580c" />
                <rect x="20" y="45" width="5" height="15" fill="#ea580c" />
                <rect x="10" y="50" width="10" height="5" fill="#ea580c" />
                <rect x="5" y="40" width="5" height="15" fill="#ea580c" />
                <rect x="30" y="25" width="20" height="15" fill="#f97316" />
                <rect x="30" y="20" width="5" height="5" fill="#f97316" />
                <rect x="45" y="20" width="5" height="5" fill="#f97316" />
                <rect x="35" y="30" width="4" height="4" fill="#111827" />
                <rect x="45" y="30" width="4" height="4" fill="#111827" />
                <g class="fishing-rod">
                    <rect x="35" y="45" width="30" height="4" fill="#d97706" transform="rotate(-30 35 45)" />
                    <rect x="61" y="28" width="2" height="35" fill="#9ca3af" />
                    <rect x="59" y="63" width="6" height="6" fill="#ef4444" />
                </g>
                <rect x="65" y="70" width="25" height="3" fill="#3b82f6" />
                <rect x="70" y="75" width="15" height="3" fill="#60a5fa" />
            </svg>
        </a>
        <div class="dev-credit">
            <span id="dev-by-text" style="font-family: 'Poppins', sans-serif; font-weight: bold; font-size: 12px;">DEVELOPED BY</span>
            <span class="dev-name rgb-animate" id="dev-name">rasukariku</span>
        </div>
    </div>

    <div id="table-float-menu" class="table-float-menu">
        <button class="table-float-btn" id="btn-copy-table" title="Copy Table to Word">📋 Copy</button>
        <div class="divider" style="height: 16px; margin: auto 5px;"></div>
        <button class="table-float-btn" id="btn-add-row" title="Add Row Below">➕ Row</button>
        <button class="table-float-btn" id="btn-add-col" title="Add Column Right">➕ Col</button>
        <div class="divider" style="height: 16px; margin: auto 5px;"></div>
        <button class="table-float-btn danger" id="btn-del-row" title="Delete Row">🗑️ Row</button>
        <button class="table-float-btn danger" id="btn-del-col" title="Delete Column">🗑️ Col</button>
        <button class="table-float-btn danger" id="btn-del-table" title="Delete Table">🗑️ Table</button>
    </div>

    <form method="POST" action="/convert" id="convertForm">
        <input type="hidden" name="markdown_content" id="hiddenMarkdownInput">
        <div class="fab-container" id="fab-container">
            <div id="fab-menu" class="fab-menu">
                <button type="submit" name="file_format" value="pdf" class="fab-item btn-pdf">PDF</button>
                <button type="submit" name="file_format" value="html" class="fab-item btn-html">HTML</button>
                <button type="submit" name="file_format" value="docx" class="fab-item btn-docx">WORD</button>
            </div>
            <button type="button" class="fab-main" id="fab-main-btn" title="Download Options">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            </button>
        </div>
    </form>

    <!-- Modals -->
    <div id="win-raw" class="modal-overlay">
        <div class="modal-window" style="width: 800px;">
            <div class="modal-header-bar">
                <div class="modal-title" id="t-raw">Paste Markdown (Auto-Format)</div>
                <button class="modal-close-btn" onclick="closeWin('win-raw')">&times;</button>
            </div>
            <div class="modal-body" style="padding:0; overflow:hidden; display:flex; flex-direction:column;">
                <div style="padding: 10px 15px; background: var(--bg-main); border-bottom: 1px solid var(--border-color); display:flex; justify-content:flex-end;">
                    <label style="font-size: 13px; color: var(--text-main); cursor:pointer;"><input type="checkbox" checked onchange="document.getElementById('raw-markdown').style.whiteSpace = this.checked ? 'pre-wrap' : 'nowrap'"> Word Wrap</label>
                </div>
                <textarea id="raw-markdown" style="flex-grow:1; border:none; height:100%; min-height: 250px; padding: 15px; font-family: monospace; resize: none;"></textarea>
            </div>
            <div class="modal-footer" style="padding: 15px; margin: 0; border-top: 1px solid var(--border-color); justify-content: flex-end;">
                <button id="btn-copy-raw" class="btn-secondary">Copy Markdown</button>
                <button class="btn-primary" onclick="closeWin('win-raw')">Apply & Close</button>
            </div>
        </div>
    </div>

    <div id="win-uni" class="modal-overlay">
        <div class="modal-window" style="width: 800px;">
            <div class="modal-header-bar">
                <div class="modal-title" id="t-uni">Universal Markdown Export</div>
                <button class="modal-close-btn" onclick="closeWin('win-uni')">&times;</button>
            </div>
            <div class="modal-body" style="padding:0; overflow:hidden; display:flex; flex-direction:column;">
                <div style="padding: 10px 15px; background: var(--bg-main); border-bottom: 1px solid var(--border-color); display:flex; justify-content:flex-end;">
                    <label style="font-size: 13px; color: var(--text-main); cursor:pointer;"><input type="checkbox" checked onchange="document.getElementById('universal-markdown').style.whiteSpace = this.checked ? 'pre-wrap' : 'nowrap'"> Word Wrap</label>
                </div>
                <textarea id="universal-markdown" style="flex-grow:1; border:none; height:100%; min-height: 250px; padding: 15px; font-family: monospace; resize: none;"></textarea>
            </div>
            <div class="modal-footer" style="padding: 15px; margin: 0; border-top: 1px solid var(--border-color); justify-content: flex-end;">
                <button id="btn-copy-universal" class="btn-secondary">Copy Export</button>
                <button class="btn-primary" onclick="closeWin('win-uni')">Apply & Close</button>
            </div>
        </div>
    </div>

    <div id="win-table" class="modal-overlay">
        <div class="modal-window" style="width: 400px; min-height: auto;">
            <div class="modal-header-bar">
                <div class="modal-title" id="t-table">Insert Table</div>
                <button class="modal-close-btn" onclick="closeWin('win-table')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label id="lbl-col">Columns:</label>
                    <input type="number" id="table-cols" value="3" min="1" max="20">
                </div>
                <div class="form-group">
                    <label id="lbl-row">Rows:</label>
                    <input type="number" id="table-rows" value="3" min="1" max="50">
                </div>
            </div>
            <div class="modal-footer" style="padding: 15px; border-top: 1px solid var(--border-color);">
                <button class="btn-primary" id="btn-confirm-table">Insert Table</button>
            </div>
        </div>
    </div>

    <div id="win-link" class="modal-overlay">
        <div class="modal-window" style="width: 450px; min-height: auto;">
            <div class="modal-header-bar">
                <div class="modal-title" id="t-link">Insert / Edit Link</div>
                <button class="modal-close-btn" onclick="closeWin('win-link')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label id="lbl-link-text">Text to display:</label>
                    <input type="text" id="link-text-input" placeholder="Example: Click Here">
                </div>
                <div class="form-group">
                    <label id="lbl-link-url">URL Address:</label>
                    <input type="text" id="link-url-input" placeholder="https://...">
                </div>
            </div>
            <div class="modal-footer" style="padding: 15px; border-top: 1px solid var(--border-color);">
                <button class="btn-secondary" onclick="closeWin('win-link')">Cancel</button>
                <button class="btn-primary" id="btn-confirm-link">Insert</button>
            </div>
        </div>
    </div>

    <div id="win-image" class="modal-overlay">
        <div class="modal-window" style="width: 450px; min-height: auto;">
            <div class="modal-header-bar">
                <div class="modal-title" id="t-image">Insert Image Link</div>
                <button class="modal-close-btn" onclick="closeWin('win-image')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label id="lbl-image-url">Image URL:</label>
                    <input type="text" id="img-url-input" placeholder="https://domain.com/image.png">
                </div>
            </div>
            <div class="modal-footer" style="padding: 15px; border-top: 1px solid var(--border-color);">
                <button class="btn-secondary" onclick="closeWin('win-image')">Cancel</button>
                <button class="btn-primary" id="btn-confirm-image">Insert</button>
            </div>
        </div>
    </div>

    <div id="win-find" class="modal-overlay">
        <div class="modal-window" style="width: 450px; min-height: auto;">
            <div class="modal-header-bar">
                <div class="modal-title" id="t-find">Find and Replace</div>
                <button class="modal-close-btn" onclick="closeWin('win-find')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label id="lbl-find">Find what:</label>
                    <input type="text" id="find-input" placeholder="Text to find...">
                </div>
                <div class="form-group">
                    <label id="lbl-replace">Replace with:</label>
                    <input type="text" id="replace-input" placeholder="Replace with...">
                </div>
            </div>
            <div class="modal-footer" style="padding: 15px; border-top: 1px solid var(--border-color); justify-content: space-between;">
                <button class="btn-secondary" onclick="executeReplaceAll()" style="color:#d93025; border-color:#d93025;" id="btn-replace-all">Replace All</button>
                <div style="display:flex; gap:10px;">
                    <button class="btn-secondary" onclick="executeFind()" id="btn-find-next">Find Next</button>
                    <button class="btn-primary" onclick="executeReplace()" id="btn-replace-btn">Replace</button>
                </div>
            </div>
        </div>
    </div>

    <div id="win-emoticon" class="modal-overlay">
        <div class="modal-window" style="width: 420px; min-height: auto;">
            <div class="modal-header-bar">
                <div class="modal-title" id="t-emoji">Select Emoticon</div>
                <button class="modal-close-btn" onclick="closeWin('win-emoticon')">&times;</button>
            </div>
            <div class="modal-body emoji-grid-container">
                <div class="emoji-grid" id="emoji-grid"></div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
